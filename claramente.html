<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f2a93b">
    <meta name="description" content="Flujo guiado de Claramente para dividir una cuenta paso a paso.">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'">
    <title>claramente: dividir la cuenta</title>
    <link rel="icon" href="icon-192.png">
    <link rel="stylesheet" href="claramente.css">
  </head>
  <body>
    <main class="claramente-shell">
      <header class="flow-topbar" aria-label="Progreso">
        <button class="back-button" id="backBtn" type="button">Atras</button>
        <span class="progress-label" id="progressLabel">Inicio</span>
      </header>

      <section class="flow-card" id="screenRoot" aria-live="polite"></section>
    </main>

    <dialog class="sheet" id="editSheet">
      <form method="dialog" class="sheet-panel" id="editForm">
        <div class="sheet-handle" aria-hidden="true"></div>
        <div class="sheet-header">
          <h2 id="sheetTitle">Editar</h2>
          <button class="icon-button" id="closeSheetBtn" type="button" aria-label="Cerrar">
            <svg class="mono-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </div>
        <div class="sheet-body" id="sheetBody"></div>
        <div class="sheet-actions" id="sheetActions"></div>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="shell-router.js" defer></script>
    <script src="clara-core.js" defer></script>
    <script src="claramente.js" defer></script>
  </body>
</html>
